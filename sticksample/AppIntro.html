<span class="material-symbols-outlined text-xl">more_vert</span>
</button>
</div>
<div class="flex items-center">
<span class="inline-flex items-center gap-1.5 rounded-full bg-yellow-100 dark:bg-yellow-500/20 px-2 py-1 text-xs font-medium text-yellow-800 dark:text-yellow-300">
<span class="size-1.5 rounded-full bg-yellow-500"></span>
                        Chưa tóm tắt
                    </span>
</div>
</div>

<p class="font-display text-sm font-normal text-slate-500 dark:text-slate-400">22 tháng 10, 2023 • 28:50</p>
</div>
<button class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-xl">more_vert</span>
</button>
</div>
<div class="flex items-center">
<span class="inline-flex items-center gap-1.5 rounded-full bg-green-100 dark:bg-green-500/20 px-2 py-1 text-xs font-medium text-green-700 dark:text-green-300">
<span class="size-1.5 rounded-full bg-green-500"></span>
                        Đã tóm tắt
                    </span>
</div>
</div>
<!-- List Item 4 -->
<div class="flex cursor-pointer flex-col gap-4 rounded-xl bg-white dark:bg-slate-800/50 p-4 transition-all hover:bg-slate-50 dark:hover:bg-slate-800/80">

<div class="flex flex-col">
<p class="font-display text-base font-bold text-slate-900 dark:text-white line-clamp-2">Phỏng vấn ứng viên Dev</p>
<p class="font-display text-sm font-normal text-slate-500 dark:text-slate-400">21 tháng 10, 2023 • 55:10</p>
</div>
<button class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-xl">more_vert</span>
</button>
</div>
<div class="flex items-center">
<span class="inline-flex items-center gap-1.5 rounded-full bg-yellow-100 dark:bg-yellow-500/20 px-2 py-1 text-xs font-medium text-yellow-800 dark:text-yellow-300">
<span class="size-1.5 rounded-full bg-yellow-500"></span>
                        Chưa tóm tắt
                    </span>
</div>
</div>
</main>
<!-- Floating Action Button -->
<div class="fixed bottom-6 right-6 z-20">
<button class="flex h-14 w-14 items-center justify-center rounded-2xl bg-primary text-white shadow-lg transition-transform active:scale-95">
<span class="material-symbols-outlined text-3xl">mic</span>
</button>
</div>
</div>
