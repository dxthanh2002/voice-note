<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Active Recording - Meeting AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3b82f6",
                        "deep-navy": "#0B1222",
                        "card-dark": "#1e293b",
                        "recording-red": "#ef4444"
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: 100dvh;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .waveform-bar {
            width: 4px;
            border-radius: 4px;
            background: linear-gradient(to top, #3b82f6, #60a5fa);
            transition: height 0.3s ease;
        }
        .timer-glow {
            text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-deep-navy text-slate-100 antialiased selection:bg-primary/20">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<header class="flex items-center justify-between px-6 pt-8 pb-4">
<button class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-800/50 text-slate-400">
<span class="material-symbols-outlined">keyboard_arrow_down</span>
</button>
<div class="flex flex-col items-center">
<span class="text-[10px] font-bold uppercase tracking-[0.2em] text-primary mb-1">Live Recording</span>
<h1 class="text-base font-semibold text-white">Q4 Planning Meeting</h1>
</div>
<button class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-800/50 text-slate-400">
<span class="material-symbols-outlined">more_horiz</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-8">
<div class="relative flex h-48 w-full items-center justify-center gap-1.5">
<div class="waveform-bar h-12"></div>
<div class="waveform-bar h-24"></div>
<div class="waveform-bar h-16"></div>
<div class="waveform-bar h-32"></div>
<div class="waveform-bar h-40"></div>
<div class="waveform-bar h-28"></div>
<div class="waveform-bar h-44"></div>
<div class="waveform-bar h-36"></div>
<div class="waveform-bar h-20"></div>
<div class="waveform-bar h-48"></div>
<div class="waveform-bar h-32"></div>
<div class="waveform-bar h-40"></div>
<div class="waveform-bar h-16"></div>
<div class="waveform-bar h-24"></div>
<div class="waveform-bar h-12"></div>
<div class="waveform-bar h-32"></div>
<div class="waveform-bar h-20"></div>
<div class="waveform-bar h-28"></div>
</div>
<div class="mt-16 text-center">
<div class="timer-glow text-6xl font-bold tracking-tight text-white tabular-nums">
                    00:15:24
                </div>
<p class="mt-2 text-sm font-medium text-slate-500 uppercase tracking-widest">Elapsed Time</p>
</div>
</main>
<footer class="px-8 pb-12 pt-6">
<div class="flex items-center gap-6">
<button class="flex-1 flex items-center justify-center gap-2 rounded-3xl border border-slate-700 bg-slate-800/30 py-5 text-slate-300 transition-all active:scale-95">
<span class="material-symbols-outlined">pause</span>
<span class="text-lg font-semibold">Pause</span>
</button>
<button class="flex-1 flex items-center justify-center gap-2 rounded-3xl bg-recording-red py-5 text-white shadow-xl shadow-recording-red/20 transition-all active:scale-95">
<span class="material-symbols-outlined">stop</span>
<span class="text-lg font-bold">Stop</span>
</button>
</div>
<div class="mt-8 flex justify-center">
<div class="flex items-center gap-2 rounded-full bg-blue-500/10 px-4 py-2 border border-blue-500/20">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
</span>
<span class="text-xs font-semibold text-blue-400">Transcribing in real-time</span>
</div>
</div>
</footer>
<div class="absolute bottom-2 left-1/2 h-1.5 w-32 -translate-x-1/2 rounded-full bg-slate-700/50"></div>
</div>

</body></html>
