name: aimateflutter
description: "A new Flutter project."
publish_to: "none"
version: 10.0.0+10

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Core
  dio: ^5.7.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2

  # Audio recording & playback
  record: ^6.1.2

  # File & permissions
  path: ^1.9.0
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

  # Utils
  device_info_plus: ^11.2.0
  intl: ^0.19.0
  uuid: ^4.5.1

  # UI
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  just_audio: ^0.10.5
  drift: ^2.30.1
  sqlite3_flutter_libs: ^0.5.41
  secmtp_sdk: ^1.0.8
  event_bus: ^2.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.10.5
  drift_dev: ^2.30.1
  flutter_launcher_icons: ^0.14.4

# flutter_launcher_icons configuration (MUST be at root level, separate from flutter:)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter_regular.ttf
          weight: 400
        - asset: assets/fonts/inter_medium.ttf
          weight: 500
        - asset: assets/fonts/inter_semi_bold.ttf
          weight: 600
        - asset: assets/fonts/inter_bold.ttf
          weight: 700
        - asset: assets/fonts/inter_extra_bold.ttf
          weight: 800
        - asset: assets/fonts/inter_black.ttf
          weight: 900
        - asset: assets/fonts/inter_italic.ttf
          style: italic
